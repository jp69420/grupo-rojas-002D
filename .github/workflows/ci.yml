ls .github/workflows/
 de Calidad y Seguridad IaC

on:
  pull_request:
    branches:
      - main

jobs:
  analisis-estatico:
    name: "1. Análisis Estático - TFLint"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Inicializar TFLint
        run: tflint --init

      - name: Ejecutar TFLint
        run: tflint --format compact

  analisis-seguridad:
    name: "2. Análisis de Seguridad - Checkov"
    runs-on: ubuntu-latest
    needs: analisis-estatico
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Ejecutar Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          soft_fail: true

  validacion-terraform:
    name: "3. Validación Terraform"
    runs-on: ubuntu-latest
    needs: analisis-seguridad
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate
EOF